<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Noto+Sans">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
        <style>
            .gf1 {
                font-family: "system-ui", "-apple-system", "Roboto", "Helvetica Neue", "Noto Sans", "Arial", "serif";
                font-size: 20px;
                line-height: 30px;
                font-weight: 400;
                color: #ffffff;
            }
            .gf2 {
                font-family: "system-ui", "-apple-system", "Roboto", "Helvetica Neue", "Noto Sans", "Arial", "serif";
                font-size: 18px;
                line-height: 30px;
                font-weight: 400;
                color: rgba(255, 255, 255, 0.63);
            }
            .gf3 {
                font-family: "system-ui", "-apple-system", "Roboto", "Helvetica Neue", "Noto Sans", "Arial", "serif";
                font-size: 16px;
                line-height: 16px;
                font-weight: 400;
                color: #000000;
            }
        </style>
        <title>Création de votre compte</title>
    </head>
    <body bgcolor="#c0c0c0" color="#000000" marginwidth="0" marginheight="0" leftmargin="0" bottommargin="0" rightmargin="0" topmargin="0">
        <div style="background-color: #c0c0c0; margin: 0; padding: 0; width: 100%; height: 100%; min-height: 1000px;">
            <div style="width: 100%; background-color: #183034; height: 58px; padding: 0; margin: 0;">
                <a href="https://www.sign-a-pdf.com/fr/">
                    <span style="display: inline-block; float: left; width: 24px; height: 24px; margin: 16px 4px 8px 12px;">
                        <img src="https://www.sign-a-pdf.com/favicon-32x32.png" width="24" height="24" style="width: 24px; height: 24px;" border="0" alt="" />
                    </span>
                    <span class="gf1" style="display: inline-block; float: left; width: 160px; font-size: 20px; line-height: 30px; font-weight: 400; margin: 13px 4px 8px 2px;">Signer un PDF</span>
                </a>
                <span class="gf2" style="display: inline-block; float: left; font-size: 18px; line-height: 30px; font-weight: 400; color: rgba(255, 255, 255, 0.63); margin: 13px 4px 8px 2px;">Création de votre compte</span>
            </div>
            <div class="gf3" style="margin: 12px 8px 12px 8px;">
                <div class="gf3" style="margin: 0; padding: 0; font-size: 16px; line-height: 16px; font-weight: 400; color: #000000;">
                    Bonjour <b>%%user_name%%</b><br />
                    <br/>
                    Pour valider la création de votre compte, vous n'avez plus qu'à cliquer sur ce lien :<br />
                    <br />
                    <a class="gf3" style="font-size: 16px; line-height: 16px; font-weight: 400; color: #000000;" href="%%confirm_url%%">Confirmation</a><br />
                    <br />
                    À bientôt !<br />
                    <br />
                    L'équipe de Sign-a-pdf.com
                </div>
            </div>
        </div>
    </body>
</html>
